{% extends "base.html" %}

{% block title %}Register - Plant Information System{% endblock %}

{% block extra_css %}
<style>
    .auth-wrap {
        max-width: 520px;
        margin: 0 auto;
        padding: 4rem 2rem;
    }
    .auth-card {
        background: white;
        border-radius: 20px;
        padding: 2.5rem;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-header i {
        width: 58px;
        height: 58px;
        background: #f0fdf4;
        color: #10b981;
        border-radius: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.7rem;
        margin-bottom: 1rem;
    }
    .auth-header h1 {
        color: #1e293b;
        font-size: 2rem;
        margin-bottom: 0.4rem;
    }
    .auth-header p { color: #64748b; }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
    }
    .form-group label {
        color: #475569;
        font-weight: 500;
    }
    .form-group input {
        padding: 0.9rem 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-family: 'Poppins', sans-serif;
        font-size: 1rem;
        background: #fafafa;
        transition: all 0.3s ease;
    }
    .form-group input:focus {
        outline: none;
        border-color: #10b981;
        background: white;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }
    .auth-btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 1rem;
        background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        color: white;
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        transition: all 0.3s ease;
    }
    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(30, 41, 59, 0.25);
    }
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: #64748b;
    }
    .auth-footer a {
        color: #10b981;
        text-decoration: none;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <form class="auth-card fade-in" method="POST">
        <div class="auth-header">
            <i class="fas fa-user-plus"></i>
            <h1>Create Account</h1>
            <p>Register to submit plant data for admin review.</p>
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="At least 6 characters" required>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Repeat password" required>
        </div>
        <button type="submit" class="auth-btn">
            <i class="fas fa-user-check"></i> Register
        </button>
        <div class="auth-footer">
            Already registered? <a href="{{ url_for('user_login') }}">Login</a>
        </div>
    </form>
</div>
{% endblock %}
