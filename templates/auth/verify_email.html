{% extends "base.html" %}

{% block title %}Verify Email - Plant Information System{% endblock %}

{% block extra_css %}
<style>
    .auth-wrap { max-width: 480px; margin: 0 auto; padding: 4rem 2rem; }
    .auth-card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-header i { width: 58px; height: 58px; background: #f0fdf4; color: #10b981; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.7rem; margin-bottom: 1rem; }
    .auth-header h1 { color: #1e293b; font-size: 2rem; margin-bottom: 0.4rem; }
    .auth-header p { color: #64748b; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
    .form-group label { color: #475569; font-weight: 500; }
    .form-group input { padding: 0.9rem 1rem; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 1.2rem; text-align: center; letter-spacing: 0.2rem; background: #fafafa; }
    .form-group input:focus { outline: none; border-color: #10b981; background: white; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
    .auth-btn { width: 100%; border: none; border-radius: 14px; padding: 1rem; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
    .resend-btn { width: 100%; border: none; background: transparent; color: #10b981; font-weight: 600; margin-top: 1rem; cursor: pointer; font-family: 'Poppins', sans-serif; }
    .demo-otp { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; text-align: center; font-weight: 700; letter-spacing: 0.08rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <form class="auth-card fade-in" method="POST">
        <div class="auth-header">
            <i class="fas fa-envelope-circle-check"></i>
            <h1>Verify Email</h1>
            <p>Enter the OTP sent to {{ email }}.</p>
        </div>
        {% if demo_otp %}
        <div class="demo-otp">Demo OTP: {{ demo_otp }}</div>
        {% endif %}
        <div class="form-group">
            <label>OTP</label>
            <input type="text" name="otp" inputmode="numeric" maxlength="6" placeholder="000000" required>
        </div>
        <button type="submit" class="auth-btn">
            <i class="fas fa-check-circle"></i> Verify
        </button>
    </form>
    <form method="POST" action="{{ url_for('resend_otp') }}">
        <button type="submit" class="resend-btn">Resend OTP</button>
    </form>
</div>
{% endblock %}
